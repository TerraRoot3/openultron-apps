<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邮件批量发送工具</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📧 邮件批量发送工具</h1>
      <p class="subtitle">快速、安全、高效的邮件群发解决方案</p>
    </header>

    <main>
      <section class="card">
        <h2>1. SMTP 配置</h2>
        <div class="form-group">
          <label>SMTP 服务器</label>
          <input type="text" id="smtpHost" placeholder="例如: smtp.gmail.com">
        </div>
        <div class="row">
          <div class="form-group">
            <label>端口</label>
            <input type="number" id="smtpPort" value="587" placeholder="587">
          </div>
          <div class="form-group">
            <label>安全连接</label>
            <select id="smtpSecure">
              <option value="false">TLS (推荐)</option>
              <option value="true">SSL</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>邮箱账号</label>
          <input type="email" id="smtpUser" placeholder="your-email@example.com">
        </div>
        <div class="form-group">
          <label>邮箱密码/授权码</label>
          <input type="password" id="smtpPass" placeholder="密码或授权码">
        </div>
        <div class="actions">
          <button class="btn btn-primary" onclick="saveSmtpConfig()">保存配置</button>
          <button class="btn btn-secondary" onclick="testSmtpConnection()">测试连接</button>
        </div>
        <div id="smtpStatus" class="status hidden"></div>
      </section>

      <section class="card">
        <h2>2. 上传收件人列表 (Excel)</h2>
        <div class="upload-area" id="dropZone">
          <input type="file" id="fileInput" accept=".xlsx,.xls" hidden>
          <div class="upload-icon">📁</div>
          <p>拖拽Excel文件到此处，或点击选择文件</p>
          <p class="hint">支持 .xlsx 和 .xls 格式，需包含邮箱列（列名可为 email/邮箱/Email）</p>
        </div>
        <div id="fileInfo" class="file-info hidden">
          <h3>文件信息</h3>
          <p>文件名: <span id="fileName"></span></p>
          <p>总记录数: <span id="totalRows"></span></p>
          <p>识别列: <span id="detectedColumns"></span></p>
          <div class="table-preview">
            <h4>前10行预览</h4>
            <div id="previewTable"></div>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>3. 邮件内容编辑</h2>
        <div class="form-group">
          <label>发件人邮箱</label>
          <input type="email" id="fromEmail" placeholder="from@example.com">
        </div>
        <div class="form-group">
          <label>发件人名称 (可选)</label>
          <input type="text" id="fromName" placeholder="例如: 张三">
        </div>
        <div class="form-group">
          <label>邮件主题</label>
          <input type="text" id="emailSubject" placeholder="支持变量: {{name}}, {{email}} 等">
        </div>
        <div class="form-group">
          <label>邮件正文 (HTML)</label>
          <textarea id="emailBody" rows="12" placeholder="<p>尊敬的{{name}}：</p>
<p>您好！这是一封测试邮件。</p>
<p>祝好！</p>"></textarea>
        </div>
        <div class="actions">
          <button class="btn btn-secondary" onclick="loadTemplate('plain')">加载纯文本模板</button>
          <button class="btn btn-secondary" onclick="loadTemplate('styled')">加载富文本模板</button>
        </div>
      </section>

      <section class="card">
        <h2>3.5 测试邮件发送</h2>
        <p class="hint">在批量发送前，先发送一封测试邮件到指定邮箱，确认内容和格式正确</p>
        <div class="form-group">
          <label>测试收件人邮箱</label>
          <input type="email" id="testEmail" placeholder="输入接收测试邮件的邮箱地址">
        </div>
        <div class="actions">
          <button class="btn btn-warning" id="testSendBtn" onclick="sendTestEmail()" disabled>
            🧪 发送测试邮件
          </button>
        </div>
        <div id="testEmailStatus" class="status hidden"></div>
      </section>

      <section class="card">
        <h2>4. 发送控制</h2>
        <div class="send-controls">
          <div class="form-group">
            <label>发送范围</label>
            <select id="sendRange">
              <option value="all">全部收件人</option>
              <option value="test">仅测试前5位</option>
            </select>
          </div>
          <div class="form-group">
            <label>延迟 (毫秒)</label>
            <input type="number" id="sendDelay" value="500" min="0">
          </div>
          <button class="btn btn-primary btn-large" id="sendBtn" onclick="sendEmails()" disabled>
            开始发送
          </button>
        </div>
        
        <div id="progressSection" class="progress-section hidden">
          <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
          </div>
          <div class="progress-text">
            进度: <span id="progressText">0/0</span> | 
            成功: <span id="successCount">0</span> | 
            失败: <span id="failCount">0</span>
          </div>
        </div>
        
        <div id="sendResults" class="results hidden">
          <h3>发送结果</h3>
          <div id="resultsSummary" class="summary"></div>
          <div id="resultsList" class="results-list"></div>
        </div>
      </section>
    </main>

    <footer>
      <p>邮件批量发送工具 v0.1.0 | 支持批量发送与变量替换</p>
    </footer>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
